<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="#" />
    <title>Pokemon App</title>
  </head>
  <body class="page">
    <header class="header">
      <ul class="nav header__nav">
        <li class="nav__item nav__logo">
          <p>GMach</p>
        </li>
        <li class="nav__item nav__search">
          <form action="/" class="nav__form">
            <input
              type="text"
              name="header search field"
              class="nav__input"
              id="nav__input"
              title="header search field"
              aria-label="header search field"
              placeholder="Search for Pokemon"
            />
            <button
              type="submit"
              class="btn btn--search"
              title="search form button"
            >
              Search
            </button>
          </form>
        </li>
        <li class="nav__item nav__feed-container">
          <button type="button" class="btn btn--feed">List</button>
        </li>
      </ul>
    </header>
    <main>
      <section class="page__hero">
        <h1 class="page__title">Poke App</h1>

        <ul class="pokemon-list hero__pokemon-list"></ul>
      </section>
    </main>
    <footer class="page__footer">&copy;2026 GMach</footer>

    <div id="custom-modal" class="modal hidden">
      <div class="modal__content">
        <p id="modal-message"></p>
        <div class="modal__actions">
          <button id="modal-cancel" class="btn" type="button">Cancel</button>
          <button id="modal-confirm" class="btn btn--modal" type="button">
            OK
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
